name: SAM-EM-app
channels:
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    - torch
    - torchvision
    # Core scientific stack
    - numpy==2.3.3
    - pillow==11.3.0
    - matplotlib==3.10.6
    - scikit-image==0.25.2
    - pandas==2.3.3
    # SAM-2 (installed directly from Meta's repository)
    - sam-2 @ git+https://github.com/facebookresearch/sam2.git
    # GUI
    - customtkinter
    - CTkMessagebox
    - CTkColorPicker
