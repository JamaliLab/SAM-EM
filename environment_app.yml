name: SAM-EM-app
channels:
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    - torch
    - torchvision
    # Core scientific stack
    - numpy
    - pillow
    - matplotlib
    - scikit-image
    - pandas
    # SAM-2 (installed directly from Meta's repository)
    - sam-2 @ git+https://github.com/facebookresearch/sam2.git
    # GUI
    - customtkinter
    - CTkMessagebox
    - CTkColorPicker
