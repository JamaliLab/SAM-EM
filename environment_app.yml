name: SAM-EM-app
channels:
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
      # see manual install instructions regarding torch/torchvision versions and GPU compatability
      - torch
      - torchvision
      # Core scientific stack
      - numpy==2.2.6
      - pillow==12.2.0
      - matplotlib==3.10.8
      - scikit-image==0.25.2
      - pandas==2.3.3
      - hydra-core==1.3.2
      - omegaconf==2.3.0
      - iopath==0.1.10
      # SAM-2 (installed directly from Meta's repository)
      - sam-2 @ git+https://github.com/facebookresearch/sam2.git
      # GUI
      - customtkinter==5.2.2
      - CTkMessagebox==2.7
      - CTkColorPicker==0.9.0
